name: Feature / Ability Request
description: Propose a new ability, workflow, or feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What should it do?
      placeholder: Describe the feature or ability
    validations:
      required: true

  - type: textarea
    id: example-queries
    attributes:
      label: Example user queries
      placeholder: |
        - "switch to dark theme"
        - "list all users"

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New ability (single operation)
        - New workflow (multi-step)
        - UI improvement
        - Other
    validations:
      required: true
